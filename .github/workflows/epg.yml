name: Update Serie A EPG

on:
  schedule:
    - cron: '0 2 * * *' # كل يوم الساعة 02:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install requests library
      run: |
        python -m pip install --upgrade pip
        python -m pip install requests

    - name: Run EPG script
      run: |
        python epg.py
        if [ -f epg.xml ]; then
          echo "epg.xml تم إنشاؤه بنجاح"
        else
          echo "خطأ: epg.xml لم يتم إنشاؤه"
          exit 1
        fi

    - name: Commit and push epg.xml
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add epg.xml
        git commit -m "Update EPG $(date +'%Y-%m-%d')" || echo "No changes to commit"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
